apiVersion: v1
kind: Pod
metadata:
  name: hunter-worker01
  namespace: volume-flag
spec:
  nodeName: worker01
  restartPolicy: Never
  containers:
  - name: shell
    image: busybox
    command: ["sh", "-c", "sleep 3600"]
    securityContext:
      privileged: true
      runAsUser: 0
    volumeMounts:
    - name: hostroot
      mountPath: /host
  volumes:
  - name: hostroot
    hostPath:
      path: /
      type: Directory
