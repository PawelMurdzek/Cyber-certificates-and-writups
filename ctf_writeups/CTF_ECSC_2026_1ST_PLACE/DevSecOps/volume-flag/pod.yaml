apiVersion: v1
kind: Pod
metadata:
  name: hunter
  namespace: volume-flag
spec:
  restartPolicy: Never
  hostPID: true
  hostNetwork: true
  containers:
  - name: shell
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
    securityContext:
      privileged: true
      runAsUser: 0
    volumeMounts:
    - name: hostroot
      mountPath: /host
  volumes:
  - name: hostroot
    hostPath:
      path: /
      type: Directory
